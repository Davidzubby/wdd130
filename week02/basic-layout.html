<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="descritption" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="David Azubuike Ezenwa">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="web picture" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.youtube.com/watch?v=K5ktrd86REk"> youtube</a> </li>
            <li><a href="https://www.britannica.com/art/music">reasearch</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading one</h2>
            <p>paragraph one</p>
        </section>

        <section>
            <h2>heading two</h2>
            <p>paragraph two</p>
        </section>

        <aside>
            <img
              src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/albuquerque-new-mexico/800x800/albuquerque-temple-lds-820684-wallpaper.jpg">
        </aside>
    </main>
    <footer>
        <p>David</p>
    </footer>
</body>

</html>
